version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: zajel-db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zajel_db
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./TwilioSMSClient/Database_Schema.sql:/docker-entrypoint-initdb.d/init.sql

  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zajel-webapp
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/zajel_db
      DB_USER: root
      DB_PASSWORD: password
    depends_on:
      - db

volumes:
  db-data:
